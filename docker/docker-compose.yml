version: '3.8'

services:
  db:
    image: postgres:14
    container_name: telegram_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: telegram_data
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: telegram_app
    env_file:
      - docker/.env
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  pgdata:
